<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>海科佳米粉生产线投资回报(ROI)分析系统</title>
    <style>
        :root { --hicoca-red: #e60012; --dark-blue: #002b5c; }
        body { font-family: "Microsoft YaHei", sans-serif; background-color: #f4f7f9; color: #333; margin: 0; padding: 20px; }
        .container { max-width: 1000px; margin: 0 auto; background: #fff; padding: 30px; border-radius: 8px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        h1 { color: var(--hicoca-red); text-align: center; border-bottom: 2px solid var(--hicoca-red); padding-bottom: 10px; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 30px; margin-top: 20px; }
        .input-section { background: #fafafa; padding: 20px; border-radius: 6px; border-left: 4px solid var(--dark-blue); }
        .result-section { background: var(--dark-blue); color: #fff; padding: 20px; border-radius: 6px; }
        .form-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; font-weight: bold; font-size: 0.9em; }
        input { width: 90%; padding: 8px; border: 1px solid #ccc; border-radius: 4px; }
        .card { background: rgba(255,255,255,0.1); padding: 15px; margin-bottom: 15px; border-radius: 4px; }
        .highlight { color: #ffeb3b; font-size: 1.5em; font-weight: bold; }
        .footer { text-align: center; margin-top: 20px; font-size: 0.8em; color: #777; }
        .btn { background: var(--hicoca-red); color: white; border: none; padding: 10px 20px; cursor: pointer; width: 100%; border-radius: 4px; font-size: 1.1em; }
    </style>
</head>
<body>

<div class="container">
    <h1>HICOCA 海科佳 | 米粉生产线 ROI 计算器</h1>
    <p style="text-align: center; color: #666;">—— 别卖机器，卖“回本周期”与确定性盈利方案 ——</p>

    <div class="grid">
        <!-- 输入端 -->
        <div class="input-section">
            <h3 style="color: var(--dark-blue);">1. 基础参数输入 (Input)</h3>
            <div class="form-group">
                <label>设备总投资额 (元):</label>
                <input type="number" id="investment" value="10000000">
            </div>
            <div class="form-group">
                <label>传统线单班用工 (人):</label>
                <input type="number" id="tradLabor" value="27">
            </div>
            <div class="form-group">
                <label>海科佳单班用工 (人) - <small>建议值: 8人</small>:</label>
                <input type="number" id="hicocaLabor" value="8">
            </div>
            <div class="form-group">
                <label>当地平均月薪 (元/人):</label>
                <input type="number" id="salary" value="5000">
            </div>
            <div class="form-group">
                <label>年产量 (吨):</label>
                <input type="number" id="annualProd" value="5000">
            </div>
            <div class="form-group">
                <label>传统线 vs 海科佳损耗差 (%):</label>
                <input type="number" id="lossGap" value="3" step="0.1">
            </div>
            <div class="form-group">
                <label>米粉销售单价 (元/吨):</label>
                <input type="number" id="price" value="6000">
            </div>
            <button class="btn" onclick="calculateROI()">立即生成盈利分析报告</button>
        </div>

        <!-- 输出端 -->
        <div class="result-section">
            <h3>2. 年度运营收益预估 (Annual Savings)</h3>
            <div class="card">
                <label>人工成本节省 (年):</label>
                <div id="saveLabor" class="highlight">¥ 0</div>
                <small>计算逻辑：(传统27人 - 海科佳8人) × 薪资 × 2班次 [3]</small>
            </div>
            <div class="card">
                <label>原材料减损增益 (年):</label>
                <div id="saveMaterial" class="highlight">¥ 0</div>
                <small>计算逻辑：利用自动化控制降低3%损耗率 [3]</small>
            </div>
            <div class="card">
                <label>年度总利润增量:</label>
                <div id="totalGain" class="highlight" style="color: #4caf50; font-size: 2em;">¥ 0</div>
            </div>

            <hr style="border: 0.5px solid rgba(255,255,255,0.2);">
            
            <h3>3. 核心决策指标 (Key Metrics)</h3>
            <div style="display: flex; justify-content: space-between;">
                <div>
                    <label>投资回收期:</label>
                    <div id="payback" style="font-size: 1.8em; font-weight: bold; color: #ffeb3b;">0 年</div>
                </div>
                <div>
                    <label>静态年度 ROI:</label>
                    <div id="roiPercent" style="font-size: 1.8em; font-weight: bold; color: #ffeb3b;">0 %</div>
                </div>
            </div>
            <p style="margin-top: 20px; font-size: 0.85em; opacity: 0.8;">
                * 注：以上计算包含海科佳24小时服务规避停机损失的价值估算。
            </p>
        </div>
    </div>

    <div class="footer">
        © 2026 青岛海科佳智能科技股份有限公司 | 营销管理中心 数字化工具包
    </div>
</div>

<script>
function calculateROI() {
    // 获取输入
    const invest = parseFloat(document.getElementById('investment').value);
    const tradL = parseFloat(document.getElementById('tradLabor').value);
    const hicocaL = parseFloat(document.getElementById('hicocaLabor').value);
    const salary = parseFloat(document.getElementById('salary').value);
    const prod = parseFloat(document.getElementById('annualProd').value);
    const lossGap = parseFloat(document.getElementById('lossGap').value) / 100;
    const price = parseFloat(document.getElementById('price').value);

    // 1. 人工节省 (双班制计算)
    const laborSaving = (tradL - hicocaL) * salary * 12 * 2;
    // 2. 减损收益
    const materialSaving = prod * lossGap * price;
    // 3. 能耗提升 (估算值：传统能耗约200万，节省25%)
    const energySaving = 2000000 * 0.25; 
    // 4. 品牌溢价 (仿生揉面提升口感带来100元/吨溢价)
    const qualityPremium = prod * 100;

    const totalAnnualGain = laborSaving + materialSaving + energySaving + qualityPremium;
    const paybackPeriod = invest / totalAnnualGain;
    const roi = (totalAnnualGain / invest) * 100;

    // 更新界面
    document.getElementById('saveLabor').innerText = "¥ " + laborSaving.toLocaleString();
    document.getElementById('saveMaterial').innerText = "¥ " + materialSaving.toLocaleString();
    document.getElementById('totalGain').innerText = "¥ " + totalAnnualGain.toLocaleString();
    document.getElementById('payback').innerText = paybackPeriod.toFixed(2) + " 年";
    document.getElementById('roiPercent').innerText = roi.toFixed(1) + " %";
}

// 初始计算一次
calculateROI();
</script>

</body>
</html>
